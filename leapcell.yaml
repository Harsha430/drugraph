# Leapcell Deployment Configuration
service:
  name: drug-rag-backend
  runtime: python3.11
  build_command: pip install -r requirements.txt
  start_command: uvicorn api.main:app --host 0.0.0.0 --port 8080
  port: 8080
  env:
    - name: NEO4J_URI
    - name: NEO4J_USERNAME
    - name: NEO4J_PASSWORD
    - name: GROQ_API_KEY
    - name: ALLOWED_ORIGINS
